name: animalearn
description: AnimaLearn - 2D Content Factory for emotion-script driven learning
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management (BLoC - replacing Riverpod per issue #3)
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Backend & API
  supabase_flutter: ^2.5.0
  dio: ^5.7.0

  # Animation & Canvas
  rive: ^0.13.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0

  # UI Components
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  flutter_rating_bar: ^4.0.1

  # Data / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  logger: ^2.4.0
  shared_preferences: ^2.3.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
